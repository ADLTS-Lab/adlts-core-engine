name: adlts

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: adlts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro   # auto-runs on first boot
    ports:
      - "5433:5432"    # host:5433 → container:5432 (avoids conflict with local PG)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adlts"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ADLTS API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Override database host for Docker networking
      DATABASE_URL: postgres://postgres:password@db:5432/adlts?sslmode=disable
      # Store uploads in the mounted volume
      UPLOADS_DIR: /uploads
      # Base URL for API and frontend return URL
      APP_URL: ${APP_URL:-http://localhost:8080}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      # Chapa payment
      CHAPA_SECRET_KEY: ${CHAPA_SECRET_KEY:-CHASECK_test_placeholder}
      CHAPA_WEBHOOK_SECRET: ${CHAPA_WEBHOOK_SECRET:-dev_webhook_secret}
      CHAPA_BASE_URL: ${CHAPA_BASE_URL:-https://api.chapa.co/v1}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MinIO object storage ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console  (http://localhost:9001)
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Lane Detector (Python FastAPI) ───────────────────────────────────────────
  lane-detector:
    build:
      context: ./services/lane-detector
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  uploads:
  miniodata:
