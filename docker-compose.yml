name: adlts

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: adlts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro   # auto-runs on first boot
    ports:
      - "5433:5432"    # host:5433 → container:5432 (avoids conflict with local PG)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adlts"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ADLTS API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Override database host for Docker networking
      DATABASE_URL: postgres://postgres:password@db:5432/adlts?sslmode=disable
      # Store uploads in the mounted volume
      UPLOADS_DIR: /uploads
      # Base URL for API and frontend return URL
      APP_URL: ${APP_URL:-http://localhost:8080}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      # Chapa payment
      CHAPA_SECRET_KEY: ${CHAPA_SECRET_KEY:-CHASECK_test_placeholder}
      CHAPA_WEBHOOK_SECRET: ${CHAPA_WEBHOOK_SECRET:-dev_webhook_secret}
      CHAPA_BASE_URL: ${CHAPA_BASE_URL:-https://api.chapa.co/v1}
      # Reporting integrations
      TESTING_CORE_BASE_URL: ${TESTING_CORE_BASE_URL:-https://api.adlts.et/api/v1}
      TESTING_CORE_TOKEN: ${TESTING_CORE_TOKEN:-}
      IDENTITY_BASE_URL: ${IDENTITY_BASE_URL:-https://api.adlts.et/api/v1}
      IDENTITY_TOKEN: ${IDENTITY_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}
      REPORT_OUTPUT_DIR: ${REPORT_OUTPUT_DIR:-/generated-reports}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  uploads:
