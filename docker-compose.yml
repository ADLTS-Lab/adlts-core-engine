version: "3.8"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: adlts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adlts"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ADLTS API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/adlts?sslmode=disable
      UPLOADS_DIR: /uploads
      # Base URL for API and frontend return URL
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      # Local SMTP delivery through Mailpit
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: ${SMTP_FROM:-noreply@adlts.et}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-ADLTS}
      SMTP_ENCRYPTION: none
      # Chapa payment
      CHAPA_SECRET_KEY: ${CHAPA_SECRET_KEY:-CHASECK_test_placeholder}
      CHAPA_WEBHOOK_SECRET: ${CHAPA_WEBHOOK_SECRET:-dev_webhook_secret}
      CHAPA_BASE_URL: ${CHAPA_BASE_URL:-https://api.chapa.co/v1}
      ADLTS_SERVICE_URL: http://adlts-service:8002
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MinIO object storage ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Local email capture ─────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web inbox

  # ── ADLTS Driving Test Service (Python FastAPI, port 8002) ─────────────────
  adlts-service:
    build:
      context: ./services/adlts
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS: minioadmin
      MINIO_SECRET: minioadmin
      MINIO_BUCKET: adlts
    depends_on:
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Lane Detector (Python FastAPI) ───────────────────────────────────────────
  lane-detector:
    build:
      context: ./services/lane-detector
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      minio:
        condition: service_started

volumes:
  pgdata:
  uploads:
  miniodata: