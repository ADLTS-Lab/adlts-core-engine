name: adlts-local-db

services:
  postgres:
    image: postgres:16-alpine
    container_name: adlts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: adlts
      POSTGRES_PASSWORD: adlts
      POSTGRES_DB: adlts_dev
    ports:
      - "5432:5432"
    volumes:
      - adlts_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adlts -d adlts_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  adlts_pgdata:
